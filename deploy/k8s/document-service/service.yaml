apiVersion: v1
kind: Service
metadata:
  name: document-service-svc
  namespace: crm
  labels:
    app: document-service
spec:
  selector:
    app: document-service
  ports:
    - name: http
      port: 80
      targetPort: 8082
    - name: grpc
      port: 50052
      targetPort: 50052
  type: ClusterIP