apiVersion: v1
kind: Service
metadata:
  name: notification-service-svc
  namespace: crm
  labels:
    app: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 80
      targetPort: 8081
    - name: grpc
      port: 50051
      targetPort: 50051
  type: ClusterIP