kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: crm-cluster
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080     # task-service
        protocol: TCP
      - containerPort: 30081
        hostPort: 30081     # notification-service
        protocol: TCP
      - containerPort: 30082
        hostPort: 30082     # document-service
        protocol: TCP
  - role: worker
  - role: worker