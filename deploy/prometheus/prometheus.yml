global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: task-service
    static_configs:
      - targets: ["task-service:8080"]
    metrics_path: /metrics

  - job_name: notification_service
    static_configs:
      - targets: ["task-service:8080"]
    metrics_path: /metrics

  - job_name: document_service
    static_configs:
      - targets: ["document-service:8082"]
    metrics_path: /metrics