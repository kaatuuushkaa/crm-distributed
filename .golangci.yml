version: "2"

linters:
  default: none
  enable:
    # — correctness —
    - errcheck
    - errchkjson
    - errorlint
    - errname
    - bodyclose
    - noctx
    - sqlclosecheck
    - rowserrcheck
    - contextcheck
    - nilerr
    - nilnil
    - wastedassign
    # — style & idiomatic Go —
    - govet
    - staticcheck
    - unused
    - ineffassign
    - godot
    - misspell
    - unconvert
    - unparam
    - prealloc
    - exhaustive
    - durationcheck
    - copyloopvar
    - dupword
    - usestdlibvars
    - reassign
    - revive
    - gocritic
    - sloglint
    - nolintlint
    - goconst
    - nestif
    - nakedret
    - maintidx

  settings:

    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

    staticcheck:
      checks:
        - all
        - -S1008
        - -ST1003

    revive:
      enable-all-rules: true
      rules:
        - name: line-length-limit
            - maintidx
          disabled: true
        - name: add-constant
          disabled: true
        - name: unhandled-error
          disabled: true
        - name: var-naming
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: function-length
          disabled: true
        - name: cognitive-complexity
          disabled: true
        - name: argument-limit
          disabled: true
        - name: exported
          disabled: true
        - name: early-return
          disabled: true
        - name: nested-structs
          disabled: true
        - name: get-return
          disabled: true
        - name: deep-exit
          disabled: true
        - name: import-shadowing
          disabled: true
        - name: use-any
          disabled: true
        - name: confusing-naming
          disabled: true
        - name: unused-receiver
          disabled: true
        - name: unexported-return
          disabled: true
        - name: cyclomatic
          arguments:
            - 25

    gocritic:
      enable-all: true
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - importShadow

    nestif:
      min-complexity: 7

    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

    nilnil:
      detect-opposite: true

    prealloc:
      for-loops: true

    sloglint:

      key-naming-case: snake

    usestdlibvars:
      http-method: true
      http-status-code: true
      time-layout: true

    errcheck:
      check-type-assertions: true
      check-blank: true

  exclusions:
    presets:
      - comments
      - common-false-positives
    rules:

      - path: _test\.go
        linters:
          - errcheck
          - noctx
          - gocritic
          - revive
          - unparam
          - forcetypeassert
          - nilnil
          - goconst

      - linters:
          - errcheck
        text: "Error return value of `.*(Close|Sync|Flush).*` is not checked"

      - linters:
          - revive
        text: "blank-imports"

      - path: cmd/.*/main\.go
        linters:
          - revive
          - maintidx

formatters:
  enable:
    - gci
    - gofmt
    - goimports

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(crm-distributed)

issues:
  max-same-issues: 0

run:
  timeout: 5m
  relative-path-mode: gomod